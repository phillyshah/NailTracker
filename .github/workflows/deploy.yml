name: Deploy to VPS

# Manual-only: run from the Actions tab ("Run workflow") rather than on every
# push to main, so commits aren't marked failed while the VPS deploy is done
# manually. Re-add a `push:` trigger once the VPS_SSH_KEY secret is fixed.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/summa-inventory
            git pull origin main
            set -a && source .env && set +a
            npm install
            npx prisma generate --schema=server/prisma/schema.prisma
            npx prisma migrate deploy --schema=server/prisma/schema.prisma
            npm run build
            pm2 restart summa-inventory || pm2 start ecosystem.config.js
